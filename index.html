<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Today Health Dashboard</title>

<style>
  :root {
    --bg: #f9f3f2;
    --card: #fffdfd;
    --soft-pink: #fff7fa;
    --pink: #f3c7d5;
    --blue: #d8ecff;
    --line: #f1dddd;
    --text: #333;
    --muted: #777;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .app-shell {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px;
  }

  .dashboard {
    display: grid;
    grid-template-columns: 190px 1fr;
    gap: 20px;
  }

  .sidebar {
    background: rgba(255, 255, 255, 0.75);
    border: 1px solid var(--line);
    border-radius: 26px;
    padding: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.05);
    height: fit-content;
    position: sticky;
    top: 20px;
  }

  .sidebar-title {
    font-weight: bold;
    margin: 8px 8px 14px;
    color: #555;
  }

  .tab-btn {
    width: 100%;
    background: white;
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 14px;
    margin-bottom: 10px;
    text-align: left;
    font-size: 16px;
    cursor: pointer;
  }

  .tab-btn.active {
    background: var(--pink);
    font-weight: bold;
  }

  .main-card {
    background: white;
    border-radius: 28px;
    padding: 26px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
  }

  .hero {
    background: linear-gradient(135deg, #fff7fa, #eef7ff);
    border: 1px solid var(--line);
    border-radius: 26px;
    padding: 24px;
    margin-bottom: 22px;
  }

  .hero h1 {
    margin: 0 0 8px;
  }

  .hero p {
    margin: 0;
    color: var(--muted);
  }

  .summary {
    display: grid;
    grid-template-columns: repeat(2, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 22px;
  }

  .summary-box {
    background: var(--soft-pink);
    border: 1px solid var(--line);
    padding: 18px;
    border-radius: 20px;
  }

  .summary-box strong {
    display: block;
    margin-top: 6px;
    font-size: 22px;
  }

  .panel {
    display: none;
  }

  .panel.active {
    display: block;
  }

  .card {
    padding: 22px;
    border-radius: 24px;
    background: var(--card);
    border: 1px solid var(--line);
  }

  .card h2 {
    margin-top: 0;
  }

  label {
    display: inline-block;
    margin: 10px 12px 10px 0;
  }

  input {
    padding: 9px;
    border: 1px solid #ddd;
    border-radius: 10px;
    width: 95px;
    font-size: 15px;
  }

  button {
    font-size: 16px;
    border: none;
    border-radius: 14px;
    padding: 12px 16px;
    cursor: pointer;
    margin: 6px 4px 6px 0;
  }

  .make-btn {
    background: var(--blue);
  }

  .reset-btn {
    background: #eee;
  }

  #waterGlasses {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin: 22px 0;
  }

  .glass {
    width: 48px;
    height: 72px;
    border: 3px solid #7fb8d8;
    border-radius: 8px 8px 18px 18px;
    background: white;
  }

  .glass.full {
    background: linear-gradient(to top, #8bd3ff 75%, white 75%);
  }

  .message {
    background: var(--soft-pink);
    padding: 14px;
    border-radius: 16px;
    color: #555;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 18px;
    background: white;
    border-radius: 16px;
    overflow: hidden;
  }

  th,
  td {
    border-bottom: 1px solid #eee;
    padding: 12px;
    text-align: center;
  }

  th {
    background: var(--soft-pink);
  }

  .check {
    transform: scale(1.35);
  }

  @media (max-width: 760px) {
    .dashboard {
      grid-template-columns: 1fr;
    }

    .sidebar {
      position: static;
      display: flex;
      overflow-x: auto;
      gap: 10px;
    }

    .sidebar-title {
      display: none;
    }

    .tab-btn {
      min-width: 130px;
      margin-bottom: 0;
      text-align: center;
    }

    .summary {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>

<body>
<button id="testSupabase">
  Test Supabase Connection
</button>

<p id="testResult"></p>
  <div id="authBox">
  <input id="emailInput" type="email" placeholder="Email">
  <input id="passwordInput" type="password" placeholder="Password">

  <button id="signUpBtn">Create Account</button>
  <button id="signInBtn">Sign In</button>
  <button id="signOutBtn">Sign Out</button>

  <p id="authMessage"></p>
</div>
<div class="app-shell">
  <div class="dashboard">

    <aside class="sidebar">
      <div class="sidebar-title">Daily Tools</div>
      <button class="tab-btn active" data-panel="todayPanel">🏠 Today</button>
      <button class="tab-btn" data-panel="waterPanel">💧 Water</button>
      <button class="tab-btn" data-panel="stepsPanel">🚶 Steps</button>
    </aside>

    <main class="main-card">

      <section id="todayPanel" class="panel active">
        <div class="hero">
          <h1>Today Dashboard</h1>
          <p>A gentle daily reset for water and steps.</p>
        </div>

        <div class="summary">
          <div class="summary-box">
            💧 Water
            <strong id="waterSummary">0/8</strong>
          </div>

          <div class="summary-box">
            🚶 Steps
            <strong id="stepSummary">0 checkpoints</strong>
          </div>
        </div>

        <div class="card">
          <h2>Today’s Focus</h2>
          <p class="message">
            Open each tab, follow your checkpoints, and let the little wins add up.
          </p>
        </div>
      </section>

      <section id="waterPanel" class="panel">
        <div class="card">
          <h2>💧 Water Goal</h2>

          <label>
            Water goal:
            <input id="waterGoalInput" type="number" value="8">
          </label>

          <label>
            Start hour:
            <input id="waterStartInput" type="number" value="8" min="0" max="23">
          </label>

          <label>
            End hour:
            <input id="waterEndInput" type="number" value="16" min="1" max="24">
          </label>

          <br>

          <button id="makeWaterPlan" class="make-btn">Make Water Plan</button>
          <button id="resetWater" class="reset-btn">Reset Water</button>

          <div id="waterGlasses"></div>

          <p id="waterMessage" class="message"></p>

          <table id="waterTable">
            <thead>
              <tr>
                <th>By Time</th>
                <th>Water Target</th>
                <th>Done?</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section id="stepsPanel" class="panel">
        <div class="card">
          <h2>🚶 Step Goal</h2>

          <label>
            Step goal:
            <input id="stepGoalInput" type="number" value="8000">
          </label>

          <label>
            Start hour:
            <input id="startHourInput" type="number" value="9" min="0" max="23">
          </label>

          <label>
            End hour:
            <input id="endHourInput" type="number" value="17" min="1" max="24">
          </label>

          <br>

          <button id="makeStepPlan" class="make-btn">Make Step Plan</button>
          <button id="resetSteps" class="reset-btn">Reset Steps</button>

          <p id="stepMessage" class="message"></p>

          <table id="stepTable">
            <thead>
              <tr>
                <th>By Time</th>
                <th>Fitbit Should Show</th>
                <th>Done?</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://eqnqzfghzzlnhnvejbiv.supabase.co";
const SUPABASE_KEY = "sb_publishable_qY64imdONDWDJykNFY-CCw_JaWoFpp5";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);
  const emailInput = document.getElementById("emailInput");
const passwordInput = document.getElementById("passwordInput");
const authMessage = document.getElementById("authMessage");

let currentUser = null;

document.getElementById("signUpBtn").addEventListener("click", async function() {
  const { data, error } = await supabaseClient.auth.signUp({
    email: emailInput.value,
    password: passwordInput.value
  });

  if (error) {
    authMessage.textContent = error.message;
    return;
  }

  authMessage.textContent = "Account created. Check your email if confirmation is required.";
});

document.getElementById("signInBtn").addEventListener("click", async function() {
  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email: emailInput.value,
    password: passwordInput.value
  });

  if (error) {
    authMessage.textContent = error.message;
    return;
  }

  currentUser = data.user;
  authMessage.textContent = "Signed in.";
});

document.getElementById("signOutBtn").addEventListener("click", async function() {
  await supabaseClient.auth.signOut();
  currentUser = null;
  authMessage.textContent = "Signed out.";
});
  const todayKey = new Date().toISOString().slice(0, 10);

  function dailyKey(name) {
    return name + "-" + todayKey;
  }

  function formatHour(hour) {
    const suffix = hour >= 12 ? "PM" : "AM";
    let displayHour = hour % 12;

    if (displayHour === 0) {
      displayHour = 12;
    }

    return displayHour + ":00 " + suffix;
  }

  /* TABS */

  const tabButtons = document.querySelectorAll(".tab-btn");
  const panels = document.querySelectorAll(".panel");

  tabButtons.forEach(function(button) {
    button.addEventListener("click", function() {
      tabButtons.forEach(function(btn) {
        btn.classList.remove("active");
      });

      panels.forEach(function(panel) {
        panel.classList.remove("active");
      });

      button.classList.add("active");

      const panelId = button.dataset.panel;
      document.getElementById(panelId).classList.add("active");
    });
  });

  function updateSummary() {
    const waterChecks = document.querySelectorAll(".water-check");
    const waterChecked = document.querySelectorAll(".water-check:checked");

    const stepChecks = document.querySelectorAll(".step-check");
    const stepChecked = document.querySelectorAll(".step-check:checked");

    document.getElementById("waterSummary").textContent =
      waterChecked.length + "/" + waterChecks.length;

    document.getElementById("stepSummary").textContent =
      stepChecked.length + "/" + stepChecks.length + " checkpoints";
  }

  /* WATER */

  const waterGoalInput = document.getElementById("waterGoalInput");
  const waterStartInput = document.getElementById("waterStartInput");
  const waterEndInput = document.getElementById("waterEndInput");
  const makeWaterPlanBtn = document.getElementById("makeWaterPlan");
  const resetWaterBtn = document.getElementById("resetWater");
  const waterGlasses = document.getElementById("waterGlasses");
  const waterTableBody = document.querySelector("#waterTable tbody");
  const waterMessage = document.getElementById("waterMessage");

  let savedWaterChecks =
    JSON.parse(localStorage.getItem(dailyKey("savedWaterChecks"))) || [];

  waterGoalInput.value =
    localStorage.getItem("waterGoal") || waterGoalInput.value;

  waterStartInput.value =
    localStorage.getItem("waterStart") || waterStartInput.value;

  waterEndInput.value =
    localStorage.getItem("waterEnd") || waterEndInput.value;

  function saveWaterSettings() {
    localStorage.setItem("waterGoal", waterGoalInput.value);
    localStorage.setItem("waterStart", waterStartInput.value);
    localStorage.setItem("waterEnd", waterEndInput.value);
  }

  function saveWaterChecks() {
    const checks = document.querySelectorAll(".water-check");

    const checkData = Array.from(checks).map(function(check) {
      return check.checked;
    });

    localStorage.setItem(
      dailyKey("savedWaterChecks"),
      JSON.stringify(checkData)
    );
  }

  function updateWaterGlasses() {
    const waterGoal = Number(waterGoalInput.value);
    const checked = document.querySelectorAll(".water-check:checked").length;

    waterGlasses.innerHTML = "";

    for (let i = 0; i < waterGoal; i++) {
      const glass = document.createElement("div");
      glass.className = "glass";

      if (i < checked) {
        glass.classList.add("full");
      }

      waterGlasses.appendChild(glass);
    }

    if (waterGoal > 0 && checked === waterGoal) {
      waterMessage.textContent = "🎉 Water goal completed!";
    } else {
      waterMessage.textContent = "Follow the checkpoints to finish your water goal.";
    }

    updateSummary();
  }

  function makeWaterPlan() {
    const waterGoal = Number(waterGoalInput.value);
    const startHour = Number(waterStartInput.value);
    const endHour = Number(waterEndInput.value);

    waterTableBody.innerHTML = "";

    if (!waterGoal || endHour <= startHour) {
      waterMessage.textContent = "Check your water goal and times, then try again.";
      return;
    }

    saveWaterSettings();

    const totalHours = endHour - startHour;

    for (let glassNumber = 1; glassNumber <= waterGoal; glassNumber++) {
      const targetHour =
        startHour + Math.ceil((totalHours / waterGoal) * glassNumber);

      const isChecked =
        savedWaterChecks[glassNumber - 1] === true ? "checked" : "";

      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${formatHour(targetHour)}</td>
        <td>${glassNumber} glass${glassNumber === 1 ? "" : "es"}</td>
        <td><input type="checkbox" class="check water-check" ${isChecked}></td>
      `;

      waterTableBody.appendChild(row);
    }

    updateWaterGlasses();
  }

  makeWaterPlanBtn.addEventListener("click", function() {
    savedWaterChecks = [];
    localStorage.setItem(
      dailyKey("savedWaterChecks"),
      JSON.stringify(savedWaterChecks)
    );
    makeWaterPlan();
  });

  resetWaterBtn.addEventListener("click", function() {
    savedWaterChecks = [];
    localStorage.setItem(
      dailyKey("savedWaterChecks"),
      JSON.stringify(savedWaterChecks)
    );
    makeWaterPlan();
  });

 waterTableBody.addEventListener("change", function(event) {
  if (event.target.classList.contains("water-check")) {
    saveWaterChecks();
    updateWaterGlasses();
    saveCloudData();
  }
});

  /* STEPS */

  const stepGoalInput = document.getElementById("stepGoalInput");
  const startHourInput = document.getElementById("startHourInput");
  const endHourInput = document.getElementById("endHourInput");
  const makeStepPlanBtn = document.getElementById("makeStepPlan");
  const resetStepsBtn = document.getElementById("resetSteps");
  const stepTableBody = document.querySelector("#stepTable tbody");
  const stepMessage = document.getElementById("stepMessage");

  let savedStepChecks =
    JSON.parse(localStorage.getItem(dailyKey("savedStepChecks"))) || [];

  stepGoalInput.value =
    localStorage.getItem("stepGoal") || stepGoalInput.value;

  startHourInput.value =
    localStorage.getItem("startHour") || startHourInput.value;

  endHourInput.value =
    localStorage.getItem("endHour") || endHourInput.value;

  function saveStepSettings() {
    localStorage.setItem("stepGoal", stepGoalInput.value);
    localStorage.setItem("startHour", startHourInput.value);
    localStorage.setItem("endHour", endHourInput.value);
  }

  function saveStepChecks() {
    const checks = document.querySelectorAll(".step-check");

    const checkData = Array.from(checks).map(function(check) {
      return check.checked;
    });

    localStorage.setItem(
      dailyKey("savedStepChecks"),
      JSON.stringify(checkData)
    );
  }

  function makeStepPlan() {
    const stepGoal = Number(stepGoalInput.value);
    const startHour = Number(startHourInput.value);
    const endHour = Number(endHourInput.value);

    stepTableBody.innerHTML = "";

    if (!stepGoal || endHour <= startHour) {
      stepMessage.textContent = "Check your step goal and times, then try again.";
      return;
    }

    saveStepSettings();

    const totalHours = endHour - startHour;
    const stepsPerHour = Math.ceil(stepGoal / totalHours);

    for (let i = 1; i <= totalHours; i++) {
      const targetTime = startHour + i;
      let cumulativeSteps = stepsPerHour * i;

      if (cumulativeSteps > stepGoal) {
        cumulativeSteps = stepGoal;
      }

      const isChecked =
        savedStepChecks[i - 1] === true ? "checked" : "";

      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${formatHour(targetTime)}</td>
        <td>${cumulativeSteps.toLocaleString()} steps</td>
        <td><input type="checkbox" class="check step-check" ${isChecked}></td>
      `;

      stepTableBody.appendChild(row);
    }

    checkStepParty();
    updateSummary();
  }
async function saveCloudData() {
  if (!currentUser) return;

  const waterChecks = Array.from(document.querySelectorAll(".water-check")).map(
    check => check.checked
  );

  const stepChecks = Array.from(document.querySelectorAll(".step-check")).map(
    check => check.checked
  );

  const { error } = await supabaseClient
    .from("daily_health")
    .upsert(
      {
        user_id: currentUser.id,
        date: todayKey,

        water_goal: Number(waterGoalInput.value),
        water_start: Number(waterStartInput.value),
        water_end: Number(waterEndInput.value),
        water_checks: waterChecks,

        step_goal: Number(stepGoalInput.value),
        step_start: Number(startHourInput.value),
        step_end: Number(endHourInput.value),
        step_checks: stepChecks,

        updated_at: new Date().toISOString()
      },
      { onConflict: "user_id,date" }
    );

  if (error) {
    console.log("Cloud save error:", error.message);
  }
}
  function checkStepParty() {
    const checks = document.querySelectorAll(".step-check");
    const checked = document.querySelectorAll(".step-check:checked");

    if (checks.length > 0 && checks.length === checked.length) {
      stepMessage.textContent = "🎉 Step goal plan completed!";
    } else {
      const stepGoal = Number(stepGoalInput.value);
      const startHour = Number(startHourInput.value);
      const endHour = Number(endHourInput.value);
      const totalHours = endHour - startHour;
      const stepsPerHour = Math.ceil(stepGoal / totalHours);

      stepMessage.textContent =
        "Aim for about " + stepsPerHour.toLocaleString() + " steps each hour.";
    }
  }

  makeStepPlanBtn.addEventListener("click", function() {
    savedStepChecks = [];
    localStorage.setItem(
      dailyKey("savedStepChecks"),
      JSON.stringify(savedStepChecks)
    );
    makeStepPlan();
  });

  resetStepsBtn.addEventListener("click", function() {
    savedStepChecks = [];
    localStorage.setItem(
      dailyKey("savedStepChecks"),
      JSON.stringify(savedStepChecks)
    );
    makeStepPlan();
  });

stepTableBody.addEventListener("change", function(event) {
  if (event.target.classList.contains("step-check")) {
    saveStepChecks();
    checkStepParty();
    updateSummary();
    saveCloudData();
  }
});
  /* START APP */

  makeWaterPlan();
  makeStepPlan();
  updateSummary();

  document
  .getElementById("testSupabase")
  .addEventListener("click", async function () {

    const { data, error } =
      await supabaseClient
        .from("daily_health")
        .select("*")
        .limit(1);

    if (error) {
      document.getElementById("testResult").textContent =
        "Error: " + error.message;
      return;
    }

    document.getElementById("testResult").textContent =
      "✅ Connected to Supabase";
  });
</script>

</body>
</html>
