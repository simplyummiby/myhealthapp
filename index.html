<style>
  body {
    font-family: Arial, sans-serif;
    background: #f9f3f2;
    text-align: center;
    padding: 25px;
    color: #333;
  }

  .app {
    max-width: 520px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 22px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
  }

  #glasses {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin: 20px 0;
  }

  .glass {
    width: 48px;
    height: 72px;
    border: 3px solid #7fb8d8;
    border-radius: 8px 8px 18px 18px;
    background: white;
    cursor: pointer;
  }

  .glass.full {
    background: linear-gradient(to top, #8bd3ff 75%, white 75%);
  }

  button {
    font-size: 16px;
    border: none;
    border-radius: 12px;
    padding: 12px 16px;
    cursor: pointer;
  }

  #resetWater {
    background: #eee;
  }

  #pauseSnack {
    background: #f3c7d5;
    margin-top: 15px;
  }

  #affirmationText {
    background: #fff7fa;
    padding: 18px;
    border-radius: 16px;
    min-height: 50px;
    margin-top: 15px;
  }

  .step-card {
  margin-top: 20px;
}

.step-card label {
  display: block;
  margin: 12px 0;
}

.step-card input {
  padding: 8px;
  border: 1px solid #ddd;
  border-radius: 8px;
  width: 90px;
}

#makeStepPlan {
  background: #d8ecff;
  margin: 10px 0;
}

#stepTable {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

#stepTable th,
#stepTable td {
  border-bottom: 1px solid #eee;
  padding: 10px;
}

#stepTable th {
  background: #fff7fa;
}

.step-check {
  transform: scale(1.3);
}
</style>

<div class="app">
  <h1>Sip & Pause</h1>
  <p>A gentle daily reset for water, cravings, and better choices.</p>

  <h2>Water Today</h2>

  <div id="glasses">
    <button class="glass"></button>
    <button class="glass"></button>
    <button class="glass"></button>
    <button class="glass"></button>
    <button class="glass"></button>
    <button class="glass"></button>
    <button class="glass"></button>
    <button class="glass"></button>
  </div>

  <p id="waterText">0 of 8 glasses today</p>

  <button id="resetWater">Reset Water</button>

  <h2>Snack Pause</h2>

  <button id="pauseSnack">I want to snack — help me pause</button>

  <p id="affirmationText">
    Click the button when you need a gentle reset.
  </p>
<h2>Step Goal</h2>

<div class="step-card">
  <label>
    Step goal for today:
    <input id="stepGoalInput" type="number" value="8000">
  </label>

  <label>
    Start hour:
    <input id="startHourInput" type="number" value="9" min="0" max="23">
  </label>

  <label>
    End hour:
    <input id="endHourInput" type="number" value="17" min="1" max="24">
  </label>

  <button id="makeStepPlan">Make Step Plan</button>

  <p id="stepMessage"></p>

  <table id="stepTable">
    <thead>
      <tr>
        <th>By Time</th>
        <th>Fitbit Should Show</th>
        <th>Done?</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>






</div>

<script>
  /* =========================
     WATER TRACKER
  ========================= */

  let waterCount = Number(localStorage.getItem("waterCount")) || 0;
  const goal = 8;

  const glassesDiv = document.getElementById("glasses");
  const waterText = document.getElementById("waterText");
  const resetBtn = document.getElementById("resetWater");

  function updateGlasses() {
    const buttons = glassesDiv.querySelectorAll(".glass");

    buttons.forEach(function(button, index) {
      button.classList.toggle("full", index < waterCount);
    });

    waterText.textContent = waterCount + " of " + goal + " glasses today";

    localStorage.setItem("waterCount", waterCount);
  }

  glassesDiv.addEventListener("click", function(event) {
    if (event.target.classList.contains("glass")) {
      const buttons = Array.from(glassesDiv.querySelectorAll(".glass"));
      const clickedIndex = buttons.indexOf(event.target);

      waterCount = clickedIndex + 1;
      updateGlasses();
    }
  });

  resetBtn.addEventListener("click", function() {
    waterCount = 0;
    updateGlasses();
  });


  /* =========================
     SNACK PAUSE AFFIRMATIONS
  ========================= */

  const affirmations = [
    "Pause first. I can choose what helps my body.",
    "This craving is a wave. I do not have to obey it.",
    "I am practicing care, not punishment.",
    "One better choice still counts.",
    "I can wait ten minutes and check in again.",
    "My body deserves steady, gentle choices.",
    "I do not have to snack just because the thought showed up.",
    "Water first. Then I can decide with a clearer mind."
  ];

  const pauseSnackBtn = document.getElementById("pauseSnack");
  const affirmationText = document.getElementById("affirmationText");

  pauseSnackBtn.addEventListener("click", function() {
    const randomIndex = Math.floor(Math.random() * affirmations.length);
    affirmationText.textContent = affirmations[randomIndex];
  });


  /* =========================
     STEP GOAL TRACKER
  ========================= */

  const stepGoalInput = document.getElementById("stepGoalInput");
  const startHourInput = document.getElementById("startHourInput");
  const endHourInput = document.getElementById("endHourInput");
  const makeStepPlanBtn = document.getElementById("makeStepPlan");
  const stepTableBody = document.querySelector("#stepTable tbody");
  const stepMessage = document.getElementById("stepMessage");

  let savedStepChecks = JSON.parse(localStorage.getItem("savedStepChecks")) || [];

  stepGoalInput.value = localStorage.getItem("stepGoal") || stepGoalInput.value;
  startHourInput.value = localStorage.getItem("startHour") || startHourInput.value;
  endHourInput.value = localStorage.getItem("endHour") || endHourInput.value;

  function formatHour(hour) {
    const suffix = hour >= 12 ? "PM" : "AM";
    let displayHour = hour % 12;

    if (displayHour === 0) {
      displayHour = 12;
    }

    return displayHour + ":00 " + suffix;
  }

  function saveStepSettings() {
    localStorage.setItem("stepGoal", stepGoalInput.value);
    localStorage.setItem("startHour", startHourInput.value);
    localStorage.setItem("endHour", endHourInput.value);
  }

  function saveStepChecks() {
    const checks = document.querySelectorAll(".step-check");

    const checkData = Array.from(checks).map(function(check) {
      return check.checked;
    });

    localStorage.setItem("savedStepChecks", JSON.stringify(checkData));
  }

  function makeStepPlan() {
    const stepGoal = Number(stepGoalInput.value);
    const startHour = Number(startHourInput.value);
    const endHour = Number(endHourInput.value);

    stepTableBody.innerHTML = "";
    stepMessage.textContent = "";

    if (!stepGoal || endHour <= startHour) {
      stepMessage.textContent = "Check your goal and times, then try again.";
      return;
    }

    saveStepSettings();

    const totalHours = endHour - startHour;
    const stepsPerHour = Math.ceil(stepGoal / totalHours);

    for (let i = 1; i <= totalHours; i++) {
      const targetTime = startHour + i;
      let cumulativeSteps = stepsPerHour * i;

      if (cumulativeSteps > stepGoal) {
        cumulativeSteps = stepGoal;
      }

      const isChecked = savedStepChecks[i - 1] === true ? "checked" : "";

      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${formatHour(targetTime)}</td>
        <td>${cumulativeSteps.toLocaleString()} steps</td>
        <td><input type="checkbox" class="step-check" ${isChecked}></td>
      `;

      stepTableBody.appendChild(row);
    }

    stepMessage.textContent =
      "Aim for about " + stepsPerHour.toLocaleString() + " steps each hour.";

    checkStepParty();
  }

  function checkStepParty() {
    const checks = document.querySelectorAll(".step-check");
    const checked = document.querySelectorAll(".step-check:checked");

    if (checks.length > 0 && checks.length === checked.length) {
      stepMessage.textContent = "🎉 Step goal plan completed!";
    }
  }

  makeStepPlanBtn.addEventListener("click", function() {
    savedStepChecks = [];
    localStorage.setItem("savedStepChecks", JSON.stringify(savedStepChecks));
    makeStepPlan();
  });

  stepTableBody.addEventListener("change", function(event) {
    if (event.target.classList.contains("step-check")) {
      saveStepChecks();
      checkStepParty();
    }
  });


  /* =========================
     START THE APP
  ========================= */

  updateGlasses();
  makeStepPlan();
</script>
